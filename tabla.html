        const Sparkles = (props) => <IconBase {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 5H5"/><path d="M3 7V3"/><path d="M7 3H3"/></IconBase>;

          // --- BIOLOGÍA ---
          {
            id: 'b1',

            points: 100,
            question: "¿Cuál es la unidad básica de la vida?",
            options: ["Tejido", "Órgano", "Célula", "Átomo"],

          // --- HISTORIA UNIVERSAL ---
          {

          },
           // --- GEOGRAFÍA ---
          {
            id: 'g1',
            category: "Geografía",
            points: 100,
            question: "¿Cuál es el continente más grande del mundo?",
            options: ["América", "África", "Asia", "Europa"],
            correctAnswer: "Asia",
            explanation: "Asia es el continente más extenso y poblado de la Tierra."
          },
          {
            id: 'g2',
            category: "Geografía",
            points: 200,
            question: "¿Qué línea imaginaria divide a la Tierra en hemisferio Norte y Sur?",
            options: ["Meridiano de Greenwich", "Ecuador", "Trópico de Cáncer", "Eje Terrestre"],
            correctAnswer: "Ecuador",
            explanation: "El Ecuador es el círculo máximo perpendicular al eje de rotación."
          },
          {
            id: 'g3',

            points: 300,

            options: ["Seúl", "Pekín", "Tokio", "Kioto"],

            explanation: "Tokio es la capital de facto y la ciudad más poblada de Japón."
          },
          // --- LITERATURA ---
          {
            id: 'l1',
            category: "Literatura",
            points: 100,
            question: "¿Quién escribió 'Don Quijote de la Mancha'?",
            options: ["Lope de Vega", "Cervantes", "Góngora", "Quevedo"],
            correctAnswer: "Cervantes",
            explanation: "Miguel de Cervantes Saavedra publicó la primera parte en 1605."
          },
          {
            id: 'l2',
            category: "Literatura",
            points: 200,
            question: "¿Cómo se llama el poema formado por 14 versos endecasílabos?",
            options: ["Romance", "Oda", "Soneto", "Elegía"],
            correctAnswer: "Soneto",
            explanation: "El soneto tiene dos cuartetos y dos tercetos."
          },
          {
            id: 'l3',
            category: "Literatura",
            points: 300,
            question: "¿Quién es el autor de 'Cien años de soledad'?",
            options: ["Vargas Llosa", "Cortázar", "García Márquez", "Borges"],
            correctAnswer: "García Márquez",
            explanation: "Gabriel García Márquez, premio Nobel colombiano, publicó la obra en 1967."
          }
        ];

        // --- UTILIDADES ---
        function shuffleArray(array) {
          const newArray = [...array];
          for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
          }
          return newArray;
        }

        // --- COMPONENTE APP ---
        function App() {
          const [gameState, setGameState] = useState('playing'); 
          const [questions, setQuestions] = useState([]);
          const [answeredQuestionsData, setAnsweredQuestionsData] = useState({});
          const [currentQuestion, setCurrentQuestion] = useState(null);
          const [selectedOption, setSelectedOption] = useState(null);
          const [score, setScore] = useState(0);

          const [showFilterModal, setShowFilterModal] = useState(false);
          const [activeCategories, setActiveCategories] = useState([]);

          const [isGeneratingExplanation, setIsGeneratingExplanation] = useState(false);
          const [aiExplanation, setAiExplanation] = useState(null);

          const getAIExplanation = async (question, userSelection) => {
            if (!apiKey) {
              alert("⚠️ La API Key no está configurada. Abre el archivo index.html y agrega tu clave en la variable 'apiKey'.");
              return;
            }

            setIsGeneratingExplanation(true);
            try {
              const prompt = `
                Actúa como un profesor amable. El alumno respondió una pregunta.
                Materia: "${question.category}"
                Pregunta: "${question.question}"
                Opción Correcta: "${question.correctAnswer}"
                Selección del Alumno: "${userSelection}"
                
                Explica brevemente (max 40 palabras) por qué la respuesta correcta es la correcta.
                Usa un tono alentador.
              `;

              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                  })
                }
              );

              if (!response.ok) throw new Error("API Error");

              const data = await response.json();
              const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
              setAiExplanation(text);
            } catch (error) {
              console.error("Error getting explanation:", error);
              setAiExplanation("Lo siento, no pude conectar con el tutor virtual en este momento.");
            } finally {
              setIsGeneratingExplanation(false);
            }
          };

          const initGameWithData = (data) => {
            const cats = [...new Set(data.map(q => q.category))];
            let processedQuestions = [];

            cats.forEach(cat => {
              const catQuestions = data.filter(q => q.category === cat);
              const questionsToUse = catQuestions.length >= 3 ? catQuestions.slice(0, 3) : catQuestions;
              
              const mapped = questionsToUse.map((q, index) => ({
                ...q,
                id: Math.random().toString(36).substr(2, 9),
                points: (index + 1) * 100,
                options: shuffleArray(q.options)
              }));
              processedQuestions = [...processedQuestions, ...mapped];
            });

            setQuestions(processedQuestions);
            
            // Lógica: Seleccionar 5 materias aleatorias al inicio
            const shuffledCats = shuffleArray([...cats]);
            const initialActiveCats = shuffledCats.slice(0, 5);
            setActiveCategories(initialActiveCats); 

            setGameState('playing');
            setAnsweredQuestionsData({});
            setScore(0);
            setCurrentQuestion(null);
            setSelectedOption(null);
            setAiExplanation(null);
          };

          const handleResetCurrentGame = () => {
            if (Object.keys(answeredQuestionsData).length === 0) return; 

            if (window.confirm("¿Estás seguro de que quieres reiniciar este tablero? Perderás tu puntaje actual.")) {
              setGameState('playing');
              setAnsweredQuestionsData({});
              setScore(0);
              setCurrentQuestion(null);
              setSelectedOption(null);
              setAiExplanation(null);
            }
          };

          useEffect(() => {
            initGameWithData(INITIAL_DATA);
          }, []);

          const allCategories = useMemo(() => {
            return [...new Set(questions.map(q => q.category))];
          }, [questions]);

          const visibleCategories = useMemo(() => {
            return activeCategories.length > 0 ? activeCategories : allCategories;
          }, [activeCategories, allCategories]);

          const handleQuestionClick = (question) => {
            setCurrentQuestion(question);
            setSelectedOption(null);
            setAiExplanation(null);
            setGameState('question');
          };

          const handleVerify = () => {
            if (!selectedOption) return;

            const isCorrect = selectedOption === currentQuestion.correctAnswer;
            const points = isCorrect ? currentQuestion.points : 0;

            setAnsweredQuestionsData(prev => ({
              ...prev,
              [currentQuestion.id]: {
                correct: isCorrect,
                selected: selectedOption,
                question: currentQuestion
              }
            }));

            if (isCorrect) {
              setScore(prev => prev + points);
            }

            setGameState('feedback');
          };

          const handleCloseModal = () => {
            setGameState('playing');
            setCurrentQuestion(null);
            setAiExplanation(null);
          };

          const isGameFinished = useMemo(() => {
            if (visibleCategories.length === 0) return false;
            const questionsInVisibleCats = questions.filter(q => visibleCategories.includes(q.category));
            const answeredIds = Object.keys(answeredQuestionsData);
            const allAnswered = questionsInVisibleCats.every(q => answeredIds.includes(q.id));
            return allAnswered && questionsInVisibleCats.length > 0;
          }, [visibleCategories, questions, answeredQuestionsData]);

          useEffect(() => {
            if (isGameFinished && gameState === 'playing') {
                setGameState('finished');
            }
          }, [isGameFinished, gameState]);

          const toggleCategory = (cat) => {
            setActiveCategories(prev => {
                if (prev.includes(cat)) {
                    if (prev.length === 1) return prev;
                    return prev.filter(c => c !== cat);
                } else {
                    return [...prev, cat];
                }
            });
          };

          if (questions.length === 0) return null;

          if (gameState === 'finished') {
            return (
              <ResultsScreen 
                score={score} 
                totalPoints={questions.reduce((acc, q) => {
                    if (visibleCategories.includes(q.category)) return acc + q.points;
                    return acc;
                }, 0)}
                answeredData={answeredQuestionsData}
                categories={visibleCategories}
                onRestart={() => handleResetCurrentGame()} 
                onRestartOriginal={() => initGameWithData(INITIAL_DATA)} 
              />
            );
          }

          return (
            <div className="min-h-screen bg-slate-100 p-4 font-sans text-slate-800">
              <header className="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200 gap-4">
                <div>
                  <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <Brain className="w-8 h-8 text-indigo-600" />
                    Guía de Estudio Interactiva
                  </h1>
                  <p className="text-slate-500 text-sm">Responde las preguntas de todas las materias</p>
                </div>
                
                <div className="flex items-center gap-3">
                  <button 
                    onClick={() => setShowFilterModal(true)}
                    className="p-2.5 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors flex items-center gap-2 border border-slate-200 hover:border-indigo-200"
                    title="Seleccionar Materias"
                  >
                    <Filter className="w-5 h-5" />
                    <span className="hidden md:inline text-sm font-bold">Materias ({visibleCategories.length})</span>
                  </button>

                  <button 
                    onClick={handleResetCurrentGame}
                    className="p-2.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors flex items-center gap-2 border border-transparent hover:border-indigo-100"
                    title="Reiniciar Tablero Actual"
                  >
                    <RefreshCw className="w-5 h-5" />
                    <span className="hidden md:inline text-sm font-bold">Reiniciar</span>
                  </button>

                  <div className="text-right pl-4 border-l border-slate-200 ml-1">
                    <div className="text-xs text-slate-500 uppercase font-semibold">Puntaje</div>
                    <div className="text-2xl font-bold text-indigo-600">{score}</div>
                  </div>
                </div>
              </header>

              {/* MODAL DE FILTROS */}
              {showFilterModal && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl p-6 max-w-2xl w-full shadow-2xl animate-in zoom-in duration-200">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                        <Filter className="w-6 h-6 text-indigo-600" />
                        Selecciona tus Materias
                      </h3>
                      <button onClick={() => setShowFilterModal(false)} className="text-slate-400 hover:text-slate-600">
                        <XCircle className="w-6 h-6" />
                      </button>
                    </div>
                    
                    <p className="text-slate-500 mb-4 text-sm">
                      Selecciona las materias que quieres ver en el tablero. Se han preseleccionado 5 al azar, pero puedes activar más.
                    </p>

                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6 max-h-[60vh] overflow-y-auto p-1">
                        {allCategories.map(cat => (
                            <button
                                key={cat}
                                onClick={() => toggleCategory(cat)}
                                className={`p-3 rounded-xl border-2 text-sm font-bold text-left transition-all flex items-center justify-between ${
                                    activeCategories.includes(cat)
                                    ? 'border-indigo-500 bg-indigo-50 text-indigo-700'
                                    : 'border-slate-200 bg-white text-slate-500 hover:border-slate-300'
                                }`}
                            >
                                {cat}
                                {activeCategories.includes(cat) && <CheckCircle className="w-4 h-4 text-indigo-600" />}
                            </button>
                        ))}
                    </div>

                    <div className="flex gap-3 justify-end border-t border-slate-100 pt-4">
                        <button 
                            onClick={() => setActiveCategories(allCategories)}
                            className="px-4 py-2 text-slate-500 font-bold hover:text-indigo-600 transition-colors text-sm"
                        >
                            Seleccionar Todas
                        </button>
                        <button 
                            onClick={() => setShowFilterModal(false)}
                            className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl font-bold transition-colors shadow-lg shadow-indigo-200"
                        >
                            Listo, Estudiar
                        </button>
                    </div>
                  </div>
                </div>
              )}

              {/* TABLERO (SCROLLABLE) */}
              <div className="max-w-7xl mx-auto pb-4">
                {visibleCategories.length === 0 ? (
                    <div className="text-center py-20 text-slate-400">
                        <Filter className="w-12 h-12 mx-auto mb-2 opacity-50" />
                        <p>Selecciona al menos una materia para comenzar.</p>
                    </div>
                ) : (
                    <div className="overflow-x-auto pb-4 custom-scrollbar">
                        <div 
                            className="grid gap-4"
                            style={{ 
                                gridTemplateColumns: `repeat(${visibleCategories.length}, minmax(160px, 1fr))`,
                                minWidth: visibleCategories.length > 5 ? 'max-content' : '100%' 
                            }}
                        >
                        {visibleCategories.map(cat => (
                            <div key={cat} className="bg-indigo-600 text-white p-3 rounded-t-lg text-center font-bold text-base shadow-md truncate flex items-center justify-center h-16 leading-tight animate-in fade-in">
                                <span className="whitespace-normal">{cat}</span>
                            </div>
                        ))}

                        {[0, 1, 2].map((idx) => (
                            <React.Fragment key={idx}>
                            {visibleCategories.map(cat => {
                                const catQuestions = questions.filter(q => q.category === cat);
                                const question = catQuestions.find(q => q.points === (idx + 1) * 100) || catQuestions[idx];
                                
                                if (!question) return <div key={`${cat}-${idx}`} className="bg-transparent border-b-4 border-transparent h-32"></div>;

                                const isAnswered = !!answeredQuestionsData[question.id];
                                const answerInfo = answeredQuestionsData[question.id];

                                return (
                                <button
                                    key={question.id}
                                    disabled={isAnswered}
                                    onClick={() => handleQuestionClick(question)}
                                    className={`
                                    h-32 rounded-lg flex flex-col items-center justify-center transition-all duration-200 relative animate-in zoom-in
                                    border-b-4 
                                    ${isAnswered 
                                        ? 'bg-slate-200 border-slate-300 cursor-default opacity-60' 
                                        : 'bg-white border-indigo-200 hover:border-indigo-400 hover:-translate-y-1 shadow-sm hover:shadow-md cursor-pointer group'}
                                    `}
                                >
                                    {isAnswered ? (
                                        <>
                                        <span className={`text-2xl font-bold ${answerInfo.correct ? 'text-green-600' : 'text-red-500'}`}>
                                            {answerInfo.correct ? <CheckCircle className="w-8 h-8"/> : <XCircle className="w-8 h-8"/>}
                                        </span>
                                        </>
                                    ) : (
                                    <>
                                        <span className="text-3xl font-black text-indigo-600 group-hover:scale-110 transition-transform">
                                        {question.points}
                                        </span>
                                    </>
                                    )}
                                </button>
                                );
                            })}
                            </React.Fragment>
                        ))}
                        </div>
                    </div>
                )}
              </div>

              {/* MODAL DE PREGUNTA / FEEDBACK */}
              {(gameState === 'question' || gameState === 'feedback') && currentQuestion && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200 max-h-[90vh] overflow-y-auto">
                    <div className="bg-slate-50 p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 z-10">
                      <div>
                        <span className="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-full uppercase tracking-wide">
                          {currentQuestion.category}
                        </span>
                        <span className="ml-3 text-sm font-semibold text-slate-500">
                          Por {currentQuestion.points} puntos
                        </span>
                      </div>
                      <div className="text-slate-400">
                         {gameState === 'feedback' && (
                           answeredQuestionsData[currentQuestion.id]?.correct 
                            ? <span className="flex items-center text-green-600 font-bold gap-1"><CheckCircle className="w-5 h-5"/> Correcto</span>
                            : <span className="flex items-center text-red-500 font-bold gap-1"><XCircle className="w-5 h-5"/> Incorrecto</span>
                         )}
                      </div>
                    </div>

                    <div className="p-8">
                      <h2 className="text-2xl font-bold text-slate-800 mb-8 leading-relaxed">
                        {currentQuestion.question}
                      </h2>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {currentQuestion.options.map((option) => {
                          let btnClass = "p-4 text-left border-2 rounded-xl transition-all font-medium flex items-center justify-between ";
                          
                          if (gameState === 'feedback') {
                            if (option === currentQuestion.correctAnswer) {
                              btnClass += "bg-green-50 border-green-500 text-green-700";
                            } else if (option === selectedOption && option !== currentQuestion.correctAnswer) {
                              btnClass += "bg-red-50 border-red-500 text-red-700";
                            } else {
                              btnClass += "bg-slate-50 border-slate-100 text-slate-400 opacity-50";
                            }
                          } else {
                            if (selectedOption === option) {
                              btnClass += "bg-indigo-50 border-indigo-600 text-indigo-700 ring-2 ring-indigo-200 ring-offset-1";
                            } else {
                              btnClass += "bg-white border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-slate-50";
                            }
                          }

                          return (
                            <button
                              key={option}
                              disabled={gameState === 'feedback'}
                              onClick={() => setSelectedOption(option)}
                              className={btnClass}
                            >
                              {option}
                              {gameState === 'feedback' && option === currentQuestion.correctAnswer && <CheckCircle className="w-5 h-5 text-green-600" />}
                              {gameState === 'feedback' && option === selectedOption && option !== currentQuestion.correctAnswer && <XCircle className="w-5 h-5 text-red-500" />}
                            </button>
                          );
                        })}
                      </div>

                      {gameState === 'feedback' && (
                        <div className="mt-6 space-y-4 animate-in slide-in-from-bottom-2">
                          <div className="p-4 bg-blue-50 border border-blue-100 rounded-lg flex gap-3 text-blue-800">
                            <BookOpen className="w-6 h-6 flex-shrink-0 mt-1" />
                            <div>
                              <h4 className="font-bold text-sm uppercase mb-1">Explicación Rápida</h4>
                              <p className="text-sm leading-relaxed">{currentQuestion.explanation}</p>
                            </div>
                          </div>

                          {/* Tutor IA - Solo visible si hay apiKey */}
                          {apiKey && (
                            aiExplanation ? (
                                <div className="p-4 bg-purple-50 border border-purple-100 rounded-lg flex gap-3 text-purple-900 animate-in fade-in">
                                <Sparkles className="w-6 h-6 flex-shrink-0 mt-1 text-purple-600" />
                                <div>
                                    <h4 className="font-bold text-sm uppercase mb-1 text-purple-700">Tutor Gemini Dice:</h4>
                                    <p className="text-sm leading-relaxed whitespace-pre-line">{aiExplanation}</p>
                                </div>
                                </div>
                            ) : (
                                <button
                                onClick={() => getAIExplanation(currentQuestion, selectedOption)}
                                disabled={isGeneratingExplanation}
                                className="w-full py-3 border-2 border-dashed border-purple-300 rounded-xl text-purple-600 font-bold hover:bg-purple-50 transition-colors flex items-center justify-center gap-2"
                                >
                                {isGeneratingExplanation ? (
                                    <><Loader2 className="w-5 h-5 animate-spin" /> Consultando a Gemini...</>
                                ) : (
                                    <><Sparkles className="w-5 h-5" /> ¿No te quedó claro? Pregúntale a Gemini</>
                                )}
                                </button>
                            )
                          )}
                        </div>
                      )}
                    </div>

                    <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-end sticky bottom-0 z-10">
                      {gameState === 'question' ? (
                        <button
                          disabled={!selectedOption}
                          onClick={handleVerify}
                          className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-lg shadow-indigo-200 flex items-center gap-2"
                        >
                          Verificar Respuesta <ChevronRight className="w-5 h-5" />
                        </button>
                      ) : (
                        <button
                          onClick={handleCloseModal}
                          className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-lg flex items-center gap-2"
                        >
                          Continuar <ChevronRight className="w-5 h-5" />
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function ResultsScreen({ score, totalPoints, answeredData, categories, onRestart, onRestartOriginal }) {
          const stats = useMemo(() => {
            const categoryStats = {};
            categories.forEach(cat => {
              categoryStats[cat] = { total: 0, correct: 0, questions: [] };
            });

            Object.values(answeredData).forEach(item => {
              const cat = item.question.category;
              if (categoryStats[cat]) {
                categoryStats[cat].total += 1;
                if (item.correct) categoryStats[cat].correct += 1;
                categoryStats[cat].questions.push(item);
              }
            });

            return Object.entries(categoryStats).map(([cat, data]) => ({
              category: cat,
              accuracy: data.total === 0 ? 0 : Math.round((data.correct / data.total) * 100),
              ...data
            }));
          }, [answeredData, categories]);

          const areasOfOpportunity = stats.filter(s => s.accuracy < 100 && s.total > 0);
          const percentage = totalPoints > 0 ? Math.round((score / totalPoints) * 100) : 0;

          return (
            <div className="min-h-screen bg-slate-50 p-6 flex items-center justify-center">
              <div className="max-w-4xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                
                <div className="bg-indigo-600 text-white p-10 text-center relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-white via-indigo-900 to-indigo-900 pointer-events-none"></div>
                  
                  <Trophy className="w-20 h-20 mx-auto mb-4 text-yellow-300 drop-shadow-md animate-bounce" />
                  <h1 className="text-4xl font-bold mb-2 relative z-10">Resumen de la Sesión</h1>
                  <p className="text-indigo-100 relative z-10">¡Has completado tu repaso!</p>
                  
                  <div className="mt-8 grid grid-cols-2 md:grid-cols-4 gap-4 max-w-2xl mx-auto">
                    <div className="bg-white/10 backdrop-blur-sm rounded-xl p-4">
                      <div className="text-3xl font-bold">{score}</div>
                      <div className="text-xs opacity-70 uppercase tracking-wider">Puntos</div>
                    </div>
                    <div className="bg-white/10 backdrop-blur-sm rounded-xl p-4">
                      <div className="text-3xl font-bold">{percentage}%</div>
                      <div className="text-xs opacity-70 uppercase tracking-wider">Precisión</div>
                    </div>
                     <div className="bg-white/10 backdrop-blur-sm rounded-xl p-4">
                      <div className="text-3xl font-bold">{stats.length}</div>
                      <div className="text-xs opacity-70 uppercase tracking-wider">Materias</div>
                    </div>
                     <div className="bg-white/10 backdrop-blur-sm rounded-xl p-4">
                      <div className="text-3xl font-bold">{Object.keys(answeredData).length}</div>
                      <div className="text-xs opacity-70 uppercase tracking-wider">Preguntas</div>
                    </div>
                  </div>
                </div>

                <div className="p-8">
                  <div className="mb-10">
                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                      <AlertCircle className="text-orange-500" />
                      Áreas de Oportunidad
                    </h3>

                    {areasOfOpportunity.length === 0 ? (
                      <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center text-green-800">
                        <CheckCircle className="w-12 h-12 mx-auto mb-2 text-green-500" />
                        <p className="font-bold text-lg">¡Impresionante!</p>
                        <p>Todo lo que respondiste fue correcto.</p>
                      </div>
                    ) : (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {areasOfOpportunity.map(stat => (
                          <div key={stat.category} className="border border-slate-200 rounded-xl p-5 hover:shadow-md transition-shadow">
                            <div className="flex justify-between items-center mb-4">
                              <h4 className="font-bold text-slate-700 text-lg">{stat.category}</h4>
                              <span className={`px-3 py-1 rounded-full text-xs font-bold ${stat.accuracy > 50 ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`}>
                                {stat.accuracy}% Aciertos
                              </span>
                            </div>
                            
                            <div className="space-y-3">
                              {stat.questions.filter(q => !q.correct).map((item, i) => (
                                <div key={i} className="text-sm bg-slate-50 p-3 rounded-lg border border-slate-100">
                                  <p className="text-slate-600 font-medium mb-1 line-clamp-1">{item.question.question}</p>
                                  <div className="flex gap-2 text-xs">
                                     <span className="text-red-500 line-through">{item.selected}</span>
                                     <span className="text-green-600 font-bold">{item.question.correctAnswer}</span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div className="flex flex-col md:flex-row justify-center pt-6 border-t border-slate-100 gap-4">
                    <button 
                      onClick={onRestartOriginal}
                      className="bg-slate-100 text-slate-600 px-6 py-4 rounded-xl font-bold hover:bg-slate-200 transition-colors flex items-center justify-center gap-2"
                    >
                      <BookOpen className="w-5 h-5" />
                      Volver al Original
                    </button>
                     <button 
                      onClick={onRestart}
                      className="bg-indigo-600 text-white px-6 py-4 rounded-xl font-bold hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-indigo-200"
                    >
                      <RefreshCw className="w-5 h-5" />
                      Reiniciar Mismo Juego
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
