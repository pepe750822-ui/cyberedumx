<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-HISTORIA MX | Visual Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --accent: #06b6d4;
            --success: #10b981;
            --error: #ef4444;
            --bg-body: #0f172a;
            --card-bg: #1e293b;
            --card-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-main: 'Inter', sans-serif;
            --radius: 16px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-main);
            /* Fondo oscuro profundo */
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #app-container {
            width: 100%;
            max-width: 1000px;
            padding: 30px 20px;
            padding-bottom: 80px;
        }

        /* ANIMACIONES */
        .screen { display: none; opacity: 0; transform: translateY(10px); transition: opacity 0.4s ease, transform 0.4s ease; }
        .active { display: block; opacity: 1; transform: translateY(0); }

        /* HEADER */
        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        /* --- CARDS CON IMÁGENES --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .world-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: var(--shadow);
            position: relative;
        }

        .world-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            border-color: var(--primary);
        }

        .card-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            opacity: 0.8;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .world-card:hover .card-image { opacity: 1; height: 170px; }

        .card-content { padding: 20px; }
        .world-title { font-size: 1.2rem; font-weight: 700; color: white; display: block; margin-bottom: 5px; }
        .world-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.4; }

        /* --- BANNER DE MISIÓN --- */
        .mission-header {
            position: relative;
            height: 200px;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }
        
        .mission-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mission-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(15,23,42,1), rgba(15,23,42,0));
            padding: 30px;
            padding-top: 80px;
        }

        .mission-title-large {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* --- BOTONES DE TEMA --- */
        .mission-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 18px 25px;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .mission-btn:hover {
            background: var(--card-hover);
            border-color: var(--primary);
            transform: scale(1.01);
        }

        .arrow-icon { color: var(--primary); opacity: 0; transition: 0.2s; transform: translateX(-10px); }
        .mission-btn:hover .arrow-icon { opacity: 1; transform: translateX(0); }

        /* --- QUIZ --- */
        .quiz-wrapper {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .option-btn {
            display: block;
            width: 100%;
            background: transparent;
            color: var(--text-main);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 16px;
            margin: 12px 0;
            text-align: left;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: var(--font-main);
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .correct { background: rgba(16, 185, 129, 0.15) !important; border-color: var(--success) !important; color: var(--success) !important; font-weight: 600; }
        .wrong { background: rgba(239, 68, 68, 0.15) !important; border-color: var(--error) !important; color: var(--error) !important; font-weight: 600; }

        #feedback-area {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 4px solid var(--success);
        }

        /* UTILS */
        .btn-back {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.2); }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            float: right;
            margin-top: 15px;
            transition: 0.2s;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            margin-top: 30px;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; }
            .mission-header { height: 150px; }
            .mission-title-large { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="app-container">
    
    <!-- PANTALLA 1: MUNDOS -->
    <div id="screen-worlds" class="screen active">
        <h1>CYBER-HISTORIA MX</h1>
        <div class="subtitle">Explora la historia de México a través de imágenes y desafíos.</div>
        <div id="worlds-grid" class="grid-container"></div>
    </div>

    <!-- PANTALLA 2: MISIONES -->
    <div id="screen-missions" class="screen">
        <button class="btn-back" onclick="showScreen('screen-worlds')">← Volver al Mapa</button>
        
        <div class="mission-header">
            <img id="mission-bg-img" src="" class="mission-bg" alt="Tema Header">
            <div class="mission-overlay">
                <h2 id="world-title-display" class="mission-title-large">Mundo X</h2>
            </div>
        </div>

        <p style="color:var(--text-muted); margin-bottom:20px;">Selecciona un capítulo para iniciar:</p>
        <div id="missions-list"></div>
    </div>

    <!-- PANTALLA 3: QUIZ -->
    <div id="screen-game" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button class="btn-back" onclick="backToMissions()">← Salir</button>
            <span id="q-counter" style="background:rgba(6,182,212,0.15); color:var(--accent); padding:4px 12px; border-radius:12px; font-size:0.85rem; font-weight:600;">1 / 10</span>
        </div>

        <div class="quiz-wrapper">
            <h3 id="question-text" style="margin-top:0; font-size:1.3rem; margin-bottom:25px;">...</h3>
            <div id="options-container"></div>

            <div id="feedback-area">
                <strong id="fb-title" style="display:block; margin-bottom:8px;">Explicación</strong>
                <p id="fb-text" style="color:#cbd5e1; margin:0; line-height:1.5;"></p>
                <button id="btn-next" class="btn-primary" onclick="nextQuestion()">Siguiente →</button>
                <div style="clear:both;"></div>
            </div>
        </div>
        
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    </div>

    <!-- PANTALLA 4: RESULTADO -->
    <div id="screen-result" class="screen" style="text-align:center; padding-top:50px;">
        <div style="font-size:5rem; margin-bottom:20px;">🎉</div>
        <h2 style="color:white; font-size:2rem; margin:0;">¡Capítulo Completado!</h2>
        <p style="color:var(--text-muted);">Has demostrado tu conocimiento en este tema.</p>
        
        <div style="background:var(--card-bg); display:inline-block; padding:20px 40px; border-radius:16px; margin:30px 0; border:1px solid rgba(255,255,255,0.05);">
            <div style="font-size:0.9rem; color:var(--text-muted);">Puntaje Final</div>
            <div id="final-score" style="font-size:2.5rem; font-weight:800; color:var(--success);">100%</div>
        </div>
        <br>
        <button class="btn-primary" style="float:none;" onclick="backToMissions()">Continuar Explorando</button>
    </div>

</div>

<script>

    function getThemeImage(keyword) {

        return `https://image.pollinations.ai/prompt/${encodeURIComponent(keyword)}%20realistic%20historical%20cinematic%20lighting?width=600&height=400&nologo=true`;

    let currentWorld = null;
    let currentMission = null;
    let qIndex = 0;
    let score = 0;

    window.onload = () => renderWorlds();

    function getThemeImage(keyword) {
        return `https://image.pollinations.ai/prompt/${encodeURIComponent(keyword)}%20realistic%20historical%20cinematic%20lighting?width=600&height=400&nologo=true`;
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function renderWorlds() {
        const grid = document.getElementById('worlds-grid');
        grid.innerHTML = '';
        database.forEach(w => {
            const card = document.createElement('div');
            card.className = 'world-card';
            // Imagen generada dinámicamente
            const imgUrl = getThemeImage(w.imgKeyword);
            
            card.innerHTML = `
                <img src="${imgUrl}" class="card-image" alt="${w.title}" loading="lazy">
                <div class="card-content">
                    <span class="world-title">${w.title}</span>
                    <span class="world-desc">${w.desc}</span>
                </div>
            `;
            card.onclick = () => loadMissions(w);
            grid.appendChild(card);
        });
    }

    function loadMissions(world) {
        currentWorld = world;
        // Configurar Header Visual
        const bgImg = document.getElementById('mission-bg-img');
        bgImg.src = getThemeImage(world.imgKeyword + " wallpaper"); // Imagen más amplia
        
        document.getElementById('world-title-display').innerText = world.title;
        
        const list = document.getElementById('missions-list');
        list.innerHTML = '';

        world.missions.forEach(m => {
            const btn = document.createElement('div');
            btn.className = 'mission-btn';
            btn.innerHTML = `<span>${m.title}</span> <span class="arrow-icon">➜</span>`;
            btn.onclick = () => startQuiz(m);
            list.appendChild(btn);
        });

        showScreen('screen-missions');
    }

    function backToMissions() {
        if(currentWorld) loadMissions(currentWorld);
        else showScreen('screen-worlds');
    }

    function startQuiz(mission) {
        currentMission = mission;
        qIndex = 0;
        score = 0;
        showScreen('screen-game');
        loadQuestion();
    }

    function loadQuestion() {
        const qData = currentMission.qs[qIndex];
        
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('q-counter').innerText = `${qIndex + 1} / ${currentMission.qs.length}`;
        
        document.getElementById('feedback-area').style.display = 'none';
        const optsContainer = document.getElementById('options-container');
        optsContainer.style.pointerEvents = 'auto';
        optsContainer.innerHTML = '';

        // Barra de progreso
        const pct = ((qIndex) / currentMission.qs.length) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';

        qData.opts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, qData.correct, qData.why, btn);
            optsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct, explanation, btn) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);
        document.getElementById('options-container').style.pointerEvents = 'none';

        const fbArea = document.getElementById('feedback-area');
        const fbTitle = document.getElementById('fb-title');
        
        if(selected === correct) {
            btn.classList.add('correct');
            fbArea.style.borderLeftColor = "var(--success)";
            fbTitle.innerHTML = "✅ Correcto";
            fbTitle.style.color = "var(--success)";
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns[correct].classList.add('correct');
            fbArea.style.borderLeftColor = "var(--error)";
            fbTitle.innerHTML = "❌ Incorrecto";
            fbTitle.style.color = "var(--error)";
        }

        document.getElementById('fb-text').innerText = explanation;
        fbArea.style.display = 'block';

        const nextBtn = document.getElementById('btn-next');
        if(qIndex < currentMission.qs.length - 1) {
            nextBtn.innerText = "Siguiente →";
            nextBtn.onclick = nextQuestion;
        } else {
            nextBtn.innerText = "Ver Resultados 🏆";
            nextBtn.onclick = showResults;
        }
    }

    function nextQuestion() {
        qIndex++;
        loadQuestion();
    }

    function showResults() {
        showScreen('screen-result');
        const pct = Math.round((score / currentMission.qs.length) * 100);
        document.getElementById('final-score').innerText = pct + "%";
        document.getElementById('progress-fill').style.width = '100%';
    }
</script>
