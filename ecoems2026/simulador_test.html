<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Simulador ECOEMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0a0a1a;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #00f3ff;
            margin-bottom: 30px;
        }

        .subject {
            background: #1a1a2e;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #00f3ff;
        }

        .subject h2 {
            color: #00f3ff;
            margin-bottom: 15px;
        }

        .subindex {
            background: #0f1729;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            background: #00f3ff;
            color: #0a0a1a;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00d4ff;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00f3ff;
            max-width: 700px;
            width: 90%;
        }

        .question {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00f3ff;
        }

        .option {
            background: #0f1729;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .option:hover {
            border-color: #00f3ff;
        }

        .option.selected {
            border-color: #ff00ff;
            background: rgba(255, 0, 255, 0.1);
        }

        .option.correct {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .option.incorrect {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
        }

        .feedback.incorrect {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 Test Simulador ECOEMS - Versión Simple</h1>
        <div id="subjects"></div>
    </div>

    <div id="quiz-modal" class="modal">
        <div class="modal-content">
            <h3 id="quiz-title">Pregunta 1/10</h3>
            <div class="question" id="question-text">¿Texto de la pregunta?</div>
            <div id="options"></div>
            <div id="feedback" class="feedback"></div>
            <div class="actions">
                <button onclick="closeQuiz()">Cerrar</button>
                <button id="submit-btn" onclick="submitAnswer()">Responder</button>
                <button id="next-btn" onclick="nextQuestion()" style="display:none;">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        // DATOS
        const data = {
            'hab_verb': {
                name: 'Habilidad Verbal',
                subindices: [
                    '1.1 Sinónimos',
                    '1.2 Antónimos',
                    '1.3 Analogías'
                ]
            },
            'matematicas': {
                name: 'Matemáticas',
                subindices: [
                    '2.1 Álgebra',
                    '2.2 Geometría',
                    '2.3 Aritmética'
                ]
            }
        };

        // Variables globales
        let currentSubject = '';
        let currentSubindex = 0;
        let currentQ = 0;
        let questions = [];
        let selectedAnswer = null;
        let score = 0;

        // Generar preguntas
        function generateQuestions(subjectKey, subindexIdx) {
            const subject = data[subjectKey];
            const subindexName = subject.subindices[subindexIdx];

            questions = [];
            for (let i = 0; i < 10; i++) {
                questions.push({
                    q: `Pregunta ${i + 1} sobre: ${subindexName}`,
                    options: ['Opción A', 'Opción B (correcta)', 'Opción C', 'Opción D'],
                    correct: 1,
                    explanation: `Esta es la explicación de la pregunta ${i + 1}.`
                });
            }
        }

        // Iniciar quiz
        function startQuiz(subjectKey, subindexIdx) {
            currentSubject = subjectKey;
            currentSubindex = subindexIdx;
            currentQ = 0;
            score = 0;
            selectedAnswer = null;

            generateQuestions(subjectKey, subindexIdx);

            document.getElementById('quiz-modal').classList.add('active');
            showQuestion();
        }

        // Mostrar pregunta
        function showQuestion() {
            if (currentQ >= questions.length) {
                alert(`¡Quiz completado! Puntaje: ${score}/10`);
                closeQuiz();
                return;
            }

            const q = questions[currentQ];

            document.getElementById('quiz-title').textContent = `Pregunta ${currentQ + 1}/10`;
            document.getElementById('question-text').textContent = q.q;

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => selectOption(idx);
                optionsContainer.appendChild(div);
            });

            document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('submit-btn').style.display = 'inline-block';
            document.getElementById('next-btn').style.display = 'none';
            selectedAnswer = null;
        }

        // Seleccionar opción
        function selectOption(idx) {
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === idx);
            });
            selectedAnswer = idx;
        }

        // Enviar respuesta
        function submitAnswer() {
            if (selectedAnswer === null) {
                alert('Selecciona una respuesta');
                return;
            }

            const q = questions[currentQ];
            const isCorrect = selectedAnswer === q.correct;

            if (isCorrect) score++;

            // Marcar opciones
            const options = document.querySelectorAll('.option');
            options[q.correct].classList.add('correct');
            if (!isCorrect) {
                options[selectedAnswer].classList.add('incorrect');
            }

            // Mostrar feedback
            const feedback = document.getElementById('feedback');
            feedback.textContent = (isCorrect ? '✓ ¡Correcto! ' : '✗ Incorrecto. ') + q.explanation;
            feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');

            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'inline-block';

            options.forEach(opt => opt.onclick = null);
        }

        // Siguiente pregunta
        function nextQuestion() {
            currentQ++;
            showQuestion();
        }

        // Cerrar quiz
        function closeQuiz() {
            document.getElementById('quiz-modal').classList.remove('active');
        }

        // Renderizar materias
        function renderSubjects() {
            const container = document.getElementById('subjects');

            for (const key in data) {
                const subject = data[key];

                const div = document.createElement('div');
                div.className = 'subject';
                div.innerHTML = `<h2>${subject.name}</h2>`;

                subject.subindices.forEach((subindex, idx) => {
                    const subdiv = document.createElement('div');
                    subdiv.className = 'subindex';
                    subdiv.innerHTML = `
                        <span>${subindex}</span>
                        <button onclick="startQuiz('${key}', ${idx})">Iniciar</button>
                    `;
                    div.appendChild(subdiv);
                });

                container.appendChild(div);
            }
        }

        // Inicializar
        renderSubjects();
        console.log('✅ Test simulador cargado');
    </script>
</body>

</html>
