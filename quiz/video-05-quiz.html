<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habilidad Verbal Pro - ECOEMS 2026 | Video 5 - Master</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #4338ca; /* Índigo para Video 5 Master */
            --primary-hover: #312e81;
            --secondary: #059669;
            --danger: #dc2626;
            --warning: #d97706; /* Dorado para acentos Master */
            --border: #e2e8f0;
            --hint-bg: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --border: #334155;
            --hint-bg: #2d3748;
            --glass: rgba(30, 41, 59, 0.8);
        }

        * { box-sizing: border-box; transition: background-color 0.2s, color 0.2s; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .navbar {
            width: 100%; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        .nav-tools { display: flex; align-items: center; gap: 12px; }

        .timer-container {
            display: flex; align-items: center; gap: 8px;
            background: var(--bg); border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 12px;
        }

        .timer-box { font-variant-numeric: tabular-nums; font-weight: 700; display: flex; align-items: center; gap: 5px; }

        .main-container { max-width: 900px; width: 95%; margin: 1.5rem 0; flex-grow: 1; }

        .subindex-nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .subindex-nav::-webkit-scrollbar { display: none; }

        .tab {
            padding: 8px 16px; background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; cursor: pointer; white-space: nowrap; font-weight: 500;
            color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; gap: 6px;
        }

        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tab.completed { border-color: var(--secondary); color: var(--secondary); }
        .tab.locked { opacity: 0.5; cursor: not-allowed; background: #e5e7eb; }

        .quiz-card {
            background: var(--card); border-radius: 20px; padding: 2.5rem;
            box-shadow: var(--shadow); border: 1px solid var(--border); min-height: 550px;
            position: relative;
        }

        .module-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
        .module-title { font-weight: 700; font-size: 1.1rem; color: var(--primary); }

        .progress-bar-wrap { height: 6px; background: var(--bg); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary); transition: width 0.4s; }

        .question-text { font-size: 1.3rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.4; }

        .options-grid { display: grid; gap: 12px; margin-bottom: 1.5rem; }
        @media (min-width: 768px) { .options-grid { grid-template-columns: 1fr 1fr; } }

        .option-btn {
            background: var(--bg); border: 2px solid var(--border); padding: 1rem;
            border-radius: 12px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .option-btn.correct { border-color: var(--secondary); background: rgba(5, 150, 105, 0.1); color: var(--secondary); }
        .option-btn.incorrect { border-color: var(--danger); background: rgba(220, 38, 38, 0.1); color: var(--danger); }

        .letter { width: 28px; height: 28px; background: var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .correct .letter { background: var(--secondary); color: white; }
        .incorrect .letter { background: var(--danger); color: white; }

        .btn { padding: 10px 18px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; justify-content: center; transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: none; border: 1px solid var(--border); color: var(--text-main); }
        .btn-danger-outline { background: none; border: 1px solid var(--danger); color: var(--danger); }
        .btn-ghost { background: none; color: var(--text-muted); border: none; }

        .info-box { margin-top: 1rem; padding: 1.25rem; border-radius: 12px; font-size: 0.95rem; border-left: 4px solid var(--primary); line-height: 1.5; }
        .hint-box { background: var(--hint-bg); border-color: var(--warning); font-style: italic; color: var(--text-main); }
        .explanation-box { background: rgba(67, 56, 202, 0.05); }

        .stats-panel { text-align: center; animation: fadeIn 0.5s; }
        .stat-circle { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; border: 8px solid var(--border); }
        .stat-circle.high { border-color: var(--secondary); color: var(--secondary); }
        .stat-circle.low { border-color: var(--danger); color: var(--danger); }

        .review-list { text-align: left; margin: 1.5rem 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .review-item { padding: 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: var(--card); }
        .review-item:last-child { border-bottom: none; }
        .review-item:hover { background: var(--bg); }

        table { width: 100%; border-collapse: collapse; margin-top: 2rem; font-size: 0.95rem; }
        th, td { padding: 14px; border-bottom: 1px solid var(--border); text-align: center; }
        th { background: var(--bg); font-weight: 700; color: var(--text-muted); }

        #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .footer {
            width: 100%;
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }
        
        .footer strong {
            color: var(--primary);
        }
        
        @media (max-width: 600px) {
            .quiz-card { padding: 1.25rem; min-height: 650px; }
            .navbar { padding: 1rem; }
            .module-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<canvas id="confetti"></canvas>

<nav class="navbar">
    <div class="logo"><i data-lucide="award"></i> ECOEMS 2026 | Master - Video 5</div>
    <div class="nav-tools">
        <div class="timer-container" title="Tiempo del módulo actual">
            <div class="timer-box"><i data-lucide="clock" size="16"></i> <span id="time-string">00:00</span></div>

<div class="main-container">

    </div>
</div>

<div class="footer">

<script>
    // --- CONSTANTES ---
    const SUBINDICES = ["Integración Lectora", "Vocabulario en Acción", "Desafío Master"];

    // --- DATABASE PARA VIDEO 5 - MASTER (Integración de Habilidad Verbal) ---
    const modulos = [
        {
            id: 0,
            titulo: "Integración Lectora",
            preguntas: [
                { q: "En un texto sobre 'El cambio climático', ¿cuál sería la Idea Principal?", o: ["El oso polar sufre", "El clima está cambiando por acción humana y natural", "El hielo se derrite en verano", "Hace calor hoy"], c: 1, e: "La idea principal abarca el tema global, no solo detalles específicos como el oso o el hielo.", h: "Busca lo que resume todo." },
                { q: "Si el texto dice: 'El cielo se oscureció y los pájaros callaron', ¿qué puedes inferir?", o: ["Es de noche", "Va a llover o hay una tormenta", "Los pájaros duermen", "Hay un eclipse"], c: 1, e: "Es una inferencia lógica basada en señales atmosféricas de tormenta.", h: "Señales del clima." },
                { q: "Identifica la Secuencia: 'Llegó, vio el desorden, suspiró y comenzó a limpiar'.", o: ["Ver -> Llegar -> Limpiar", "Llegar -> Ver -> Suspirar -> Limpiar", "Suspirar -> Ver -> Limpiar", "Limpiar -> Llegar"], c: 1, e: "El orden cronológico respeta la aparición de los verbos en la acción.", h: "Sigue los verbos." },
                { q: "'La contaminación es el peor problema actual'. ¿Hecho u Opinión?", o: ["Hecho científico", "Opinión/Juicio de valor", "Dato estadístico", "Ley universal"], c: 1, e: "El uso de 'peor' implica un juicio de valor subjetivo. Un hecho sería 'la contaminación ha subido un 10%'.", h: "Palabra 'peor'." },
                { q: "Relación Causa-Efecto: 'No estudió para el examen, por lo tanto...'", o: ["Sacó 10", "Reprobó o le fue mal", "El examen fue fácil", "Se fue de fiesta"], c: 1, e: "La consecuencia lógica de la falta de preparación es un mal resultado.", h: "Consecuencia lógica." },
                { q: "Si el autor usa ironía, su intención es:", o: ["Informar objetivamente", "Criticar o burlarse sutilmente", "Describir un paisaje", "Enseñar matemáticas"], c: 1, e: "La ironía busca expresar lo contrario de lo que se dice para criticar.", h: "No es literal." },
                { q: "En un texto argumentativo, la 'Tesis' es:", o: ["El final", "La postura que el autor defiende", "Los ejemplos", "El título"], c: 1, e: "Es la idea central que se busca probar o defender.", h: "Postura central." },
                { q: "Diferencia entre Resumen y Síntesis:", o: ["Son iguales", "Resumen reduce fielmente; Síntesis integra e interpreta", "Resumen es más largo", "Síntesis es solo el final"], c: 1, e: "La síntesis requiere un proceso de análisis y reestructuración personal.", h: "Literal vs Interpretado." },
                { q: "¿Qué conector indica oposición?", o: ["Además", "Sin embargo", "También", "Por ejemplo"], c: 1, e: "Marca un contraste con la idea anterior.", h: "Contraste." },
                { q: "El 'tono' del texto se refiere a:", o: ["El volumen al leer", "La actitud o emoción del autor", "El tipo de letra", "La longitud"], c: 1, e: "Puede ser sarcástico, solemne, alegre, informativo, etc.", h: "Emoción del autor." }
            ]
        },
        {
            id: 1,
            titulo: "Vocabulario en Acción",
            preguntas: [
                { q: "Analogía: 'Cerebro es a Computadora' como...", o: ["Rueda a Auto", "Corazón a Motor", "Teclado a Mano", "Pantalla a Ojo"], c: 1, e: "Ambos (Corazón y Motor) son el centro vital que impulsa el sistema.", h: "Centro vital." },
                { q: "En 'La operación fue un éxito', la palabra 'Operación' puede ser:", o: ["Solo matemática", "Militar, médica o matemática", "Solo quirúrgica", "Solo financiera"], c: 1, e: "Es una palabra polisémica con múltiples contextos válidos.", h: "Muchos campos." },
                { q: "Si alguien 'tira la toalla', significa que:", o: ["Seca el piso", "Se rinde", "Va a boxear", "Lava ropa"], c: 1, e: "Es un modismo deportivo que significa rendirse.", h: "Boxeo." },
                { q: "Sinónimo de 'Efímero' en: 'La fama es efímera'.", o: ["Eterna", "Pasajera / Breve", "Pesada", "Costosa"], c: 1, e: "Algo que dura muy poco tiempo.", h: "Dura poco." },
                { q: "Antónimo de 'Altruista':", o: ["Generoso", "Egoísta", "Amable", "Rico"], c: 1, e: "Altruista piensa en otros; egoísta solo en sí mismo.", h: "Piensa en sí mismo." },
                { q: "En 'Vela por sus intereses', 'Vela' es:", o: ["Cera con mecha", "Tela de barco", "Verbo velar (cuidar)", "Estar despierto"], c: 2, e: "Del verbo velar, significa cuidar o proteger.", h: "Acción de cuidar." },
                { q: "Analogía: 'Escultor es a Cincel' como...", o: ["Pintor a Lienzo", "Pintor a Pincel", "Músico a Canción", "Doctor a Hospital"], c: 1, e: "Sujeto a Herramienta de trabajo.", h: "Herramienta." },
                { q: "La expresión 'Echar leña al fuego' significa:", o: ["Hacer una fogata", "Empeorar una situación conflictiva", "Cocinar", "Ayudar"], c: 1, e: "Avivar un conflicto que ya existía.", h: "Empeorar." },
                { q: "Significado contextual de 'Radio' en: 'Se rompió el radio del brazo'.", o: ["Aparato de música", "Hueso del antebrazo", "Línea del círculo", "Elemento químico"], c: 1, e: "El contexto 'brazo' indica anatomía.", h: "Anatomía." },
                { q: "Diferencia entre 'Oír' y 'Escuchar':", o: ["Son iguales", "Oír es involuntario; Escuchar es prestar atención", "Oír es con aparatos", "Escuchar es sordo"], c: 1, e: "Escuchar implica voluntad y atención; oír es solo el sentido físico.", h: "Atención." }
            ]
        },
        {
            id: 2,
            titulo: "Desafío Master",
            preguntas: [
                { q: "Texto: 'Aunque llovió, el evento fue un éxito'. ¿Qué función tiene 'Aunque'?", o: ["Sumar información", "Indicar una concesión o dificultad superada", "Marcar tiempo", "Cerrar el texto"], c: 1, e: "Indica que a pesar de un obstáculo (lluvia), el resultado fue positivo.", h: "Obstáculo superado." },
                { q: "Si un autor dice 'Esta solución es un curita para una hemorragia', implica:", o: ["Es una solución médica", "Es una solución insuficiente", "Es la solución perfecta", "Es una solución barata"], c: 1, e: "Es una metáfora de insuficiencia (algo pequeño para un problema grande).", h: "Insuficiente." },
                { q: "Analogía Abstracta: 'Justicia es a Balanza' como...", o: ["Tiempo es a Reloj", "Amor es a Corazón", "Paz es a Paloma", "Libertad es a Cadena"], c: 0, e: "Concepto abstracto a Instrumento de medición/representación funcional.", h: "Medición simbólica." },
                { q: "Hecho o Opinión: 'El 90% de los científicos afirma que el clima cambia'.", o: ["Opinión (porque dicen 'afirma')", "Hecho (es un dato estadístico sobre consenso)", "Mentira", "Predicción"], c: 1, e: "El dato de que 'el 90% afirma' es un hecho verificable, independientemente de la opinión.", h: "Estadística." },
                { q: "En un debate, si alguien usa argumentos 'Ad Hominem':", o: ["Ataca la idea", "Ataca a la persona, no a la idea", "Usa datos científicos", "Habla en latín"], c: 1, e: "Es una falacia lógica donde se ataca al oponente en lugar de refutar su argumento.", h: "Contra el hombre." },
                { q: "Sinónimo de 'Paradigma' en ciencia:", o: ["Ejemplo simple", "Modelo o patrón aceptado", "Error", "Experimento"], c: 1, e: "Es un marco de referencia o modelo teórico.", h: "Modelo." },
                { q: "Si el título es 'Crónica de una muerte anunciada', infieres:", o: ["Suspenso total", "El final se conoce desde el inicio", "Es un diario", "Nadie muere"], c: 1, e: "El título anticipa el desenlace fatal.", h: "Título spoiler." },
                { q: "Modismo formal: 'Hacer caso omiso' significa:", o: ["Obedecer", "Ignorar deliberadamente", "Escribir un caso", "Juzgar"], c: 1, e: "Es una forma elegante de decir 'ignorar'.", h: "Ignorar." },
                { q: "Síntesis de: 'Juan corrió, entrenó duro, comió bien y ganó'.", o: ["Juan tiene suerte", "La disciplina de Juan lo llevó al éxito", "Juan comió", "Ganar es fácil"], c: 1, e: "Integra todas las acciones en un concepto: disciplina = éxito.", h: "Concepto global." },
                { q: "Objetivo final de la Habilidad Verbal:", o: ["Hablar mucho", "Comunicación efectiva y pensamiento crítico", "Saber palabras raras", "Aprobar y olvidar"], c: 1, e: "La meta es procesar información y expresarla con claridad y lógica.", h: "La meta real." }
            ]
        }
    ];

    // --- STATE MANAGEMENT ---
    let state = {
        moduloActual: 0,
        preguntaActual: 0,
        respuestas: Array(3).fill().map(() => Array(10).fill(null)),
        tiempos: Array(3).fill(0),
        completado: Array(3).fill(false),
        isPaused: false,
        isDark: false,
        showHint: false,
        started: false
    };

    let ticker = null;

    // --- FUNCIONES CORE ---

    function init() {
        lucide.createIcons();
        load();
        renderTabs();
        renderCurrent();
        startTicker();
    }

    function load() {
        const saved = localStorage.getItem('ecoems_2026_verbal_video5');
        if (saved) {
            state = { ...state, ...JSON.parse(saved) };
            if (state.isDark) document.documentElement.setAttribute('data-theme', 'dark');
            updateThemeIcon();
        }
    }

    function save() {
        localStorage.setItem('ecoems_2026_verbal_video5', JSON.stringify(state));
    }

    function toggleTheme() {
        state.isDark = !state.isDark;
        document.documentElement.setAttribute('data-theme', state.isDark ? 'dark' : 'light');
        updateThemeIcon();
        save();
    }

    function updateThemeIcon() {
        const icon = document.getElementById('theme-icon');
        if (icon) {
            icon.setAttribute('data-lucide', state.isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }
    }

    function startTicker() {
        if (ticker) clearInterval(ticker);
        ticker = setInterval(() => {
            if (!state.isPaused && state.started && isUnlocked(state.moduloActual) && !state.completado[state.moduloActual]) {
                state.tiempos[state.moduloActual]++;
                updateTimerDisplay();
                if (state.tiempos[state.moduloActual] % 5 === 0) save();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const t = state.tiempos[state.moduloActual];
        const m = Math.floor(t / 60);
        const s = t % 60;
        const display = document.getElementById('time-string');
        if (display) {
            display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
    }

    function togglePause() {
        state.isPaused = !state.isPaused;
        const btn = document.getElementById('timer-ctrl');
        if (btn) {
            btn.innerHTML = `<i data-lucide="${state.isPaused ? 'play' : 'pause'}" size="16"></i>`;
            lucide.createIcons();
        }
    }

    function isUnlocked(idx) {
        if (idx === 0) return true;
        return state.completado[idx - 1];
    }

    function renderTabs() {
        const nav = document.getElementById('subindex-nav');
        if (!nav) return;
        nav.innerHTML = SUBINDICES.map((name, i) => {
            const unlocked = isUnlocked(i);
            let cls = `tab ${i === state.moduloActual ? 'active' : ''} ${state.completado[i] ? 'completed' : ''}`;
            if (!unlocked) cls += ' locked';
            const icon = unlocked ? (state.completado[i] ? 'check-circle' : 'circle') : 'lock';
            return `<button class="${cls}" onclick="changeModule(${i})"><i data-lucide="${icon}" size="14"></i> ${i + 1}. ${name}</button>`;
        }).join('');
        lucide.createIcons();
    }

    function changeModule(i) {
        if (!isUnlocked(i)) return;
        state.moduloActual = i;
        state.preguntaActual = 0;
        state.showHint = false;
        state.isPaused = false;
        renderTabs();
        renderCurrent();
        updateTimerDisplay();
        save();
    }

    function resetModule(auto = false) {
        if (!auto && !confirm("¿Seguro que quieres reiniciar este módulo? Perderás tus respuestas y el tiempo de esta sección.")) return;
        
        state.respuestas[state.moduloActual] = Array(10).fill(null);
        state.tiempos[state.moduloActual] = 0;
        state.completado[state.moduloActual] = false;
        state.preguntaActual = 0;
        state.showHint = false;
        state.isPaused = false;

        for (let j = state.moduloActual + 1; j < 3; j++) {
            state.completado[j] = false;
            state.respuestas[j] = Array(10).fill(null);
            state.tiempos[j] = 0;
        }

        renderTabs();
        renderCurrent();
        updateTimerDisplay();
        save();
    }

    function renderCurrent() {
        const container = document.getElementById('current-card');
        if (!container) return;
        
        container.classList.remove('fade-in');
        void container.offsetWidth;
        container.classList.add('fade-in');

        const mIdx = state.moduloActual;

        if (!state.started) {
            renderInstructions(container);
        } else if (state.completado.every(c => c)) {
            renderFinalStats(container);
        } else if (state.completado[mIdx]) {
            renderModuleStats(container);
        } else {
            renderQuiz(container);
        }
        save();
    }

    function renderInstructions(container) {
        container.innerHTML = `
            <div class="stats-panel">
                <i data-lucide="award" size="64" style="color:var(--primary); margin-bottom:1rem"></i>
                <h1>Bienvenido al Nivel Master - Video 5</h1>
                <p style="font-size:1.1rem; color:var(--text-muted); margin-bottom:2rem">Integración de Habilidad Verbal: Comprensión Lectora y Vocabulario</p>
                
                <div class="info-box" style="text-align:left; border-color:var(--warning); margin-bottom:1.5rem">
                    <h3 style="margin-top:0">Reglas del Desafío Master:</h3>
                    <ul style="padding-left:1.5rem">
                        <li><strong>Excelencia:</strong> Debes obtener <strong>9 o 10 aciertos</strong> para pasar de módulo.</li>
                        <li><strong>Reinicio automático:</strong> Si obtienes 8 aciertos o menos, el módulo se reiniciará.</li>
                        <li><strong>Desbloqueo secuencial:</strong> Los módulos se desbloquean solo al aprobar el anterior.</li>
                        <li><strong>Tiempo:</strong> Cada módulo tiene su propio cronómetro independiente.</li>
                        <li><strong>Meta final:</strong> Demostrar dominio completo de la Habilidad Verbal.</li>
                    </ul>
                </div>
                
                <button class="btn btn-primary" style="width:100%; height:50px; font-size:1.1rem" onclick="state.started=true; renderCurrent()">
                    Iniciar Desafío Master
                </button>
            </div>
        `;
        lucide.createIcons();
    }

    function renderQuiz(container) {
        const qData = modulos[state.moduloActual].preguntas[state.preguntaActual];
        const userAns = state.respuestas[state.moduloActual][state.preguntaActual];
        const prog = ((state.preguntaActual + 1) / 10) * 100;

        container.innerHTML = `
            <div class="module-header">
                <div class="module-title">🏆 ${state.moduloActual + 1}. ${SUBINDICES[state.moduloActual]}</div>
                <button class="btn btn-outline" onclick="resetModule()" style="padding: 6px 12px; font-size: 0.8rem; height: auto;">
                    <i data-lucide="rotate-ccw" size="14"></i> Reiniciar
                </button>
            </div>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${prog}%"></div></div>
            <div class="question-text">${qData.q}</div>
            <div class="options-grid">
                ${qData.o.map((opt, i) => {
                    let cls = 'option-btn';
                    if (userAns !== null) {
                        if (i === qData.c) cls += ' correct';
                        else if (i === userAns) cls += ' incorrect';
                    }
                    return `<button class="${cls}" onclick="selectOption(${i})" ${userAns !== null ? 'disabled' : ''}>
                        <div class="letter">${String.fromCharCode(65 + i)}</div><span>${opt}</span>
                    </button>`;
                }).join('')}
            </div>
            ${state.showHint && userAns === null ? `<div class="info-box hint-box fade-in"><strong>💡 Pista Master:</strong> ${qData.h}</div>` : ''}
            ${userAns !== null ? `<div class="info-box explanation-box fade-in"><strong>📘 Análisis:</strong> ${qData.e}</div>` : ''}
            <div class="actions" style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
                <button class="btn btn-outline" onclick="prevQ()" ${state.preguntaActual === 0 ? 'disabled' : ''}><i data-lucide="chevron-left"></i> Anterior</button>
                ${userAns === null ? `<button class="btn btn-outline" onclick="toggleHint()"><i data-lucide="lightbulb"></i> Pista</button>` : '<span></span>'}
                <button class="btn btn-primary" onclick="nextQ()" ${userAns === null ? 'disabled' : ''}>
                    ${state.preguntaActual === 9 ? 'Finalizar Módulo' : 'Siguiente'} <i data-lucide="chevron-right"></i>
                </button>
            </div>
        `;
        lucide.createIcons();
    }

    function toggleHint() {
        state.showHint = !state.showHint;
        renderCurrent();
    }

    function selectOption(i) {
        state.respuestas[state.moduloActual][state.preguntaActual] = i;
        renderCurrent();
    }

    function nextQ() {
        if (state.preguntaActual < 9) {
            state.preguntaActual++;
            state.showHint = false;
            renderCurrent();
        } else {
            const moduleAns = state.respuestas[state.moduloActual];
            const moduleQuestions = modulos[state.moduloActual].preguntas;
            const score = moduleAns.filter((a, i) => a === moduleQuestions[i].c).length;
            const perc = score * 10;

            if (perc > 80) {
                state.completado[state.moduloActual] = true;
                renderTabs();
                renderCurrent();
            } else {
                alert(`❌ PUNTUACIÓN INSUFICIENTE: ${score}/10 (${perc}%).\n\nEn el nivel Master necesitas mínimo 9 aciertos. El módulo se reiniciará.`);
                resetModule(true);
            }
        }
    }

    function prevQ() {
        if (state.preguntaActual > 0) {
            state.preguntaActual--;
            state.showHint = false;
            renderCurrent();
        }
    }

    function renderModuleStats(container) {
        const moduleAns = state.respuestas[state.moduloActual];
        const moduleQuestions = modulos[state.moduloActual].preguntas;
        const score = moduleAns.filter((a, i) => a === moduleQuestions[i].c).length;
        const time = state.tiempos[state.moduloActual];
        const perc = score * 10;

        container.innerHTML = `
            <div class="stats-panel">
                <h2>✅ ¡Módulo Superado!</h2>
                <p>Has dominado: <strong>${SUBINDICES[state.moduloActual]}</strong></p>
                <div class="stat-circle high"><div>${score}/10</div><small>${perc}%</small></div>
                <p>Tiempo: <strong>${Math.floor(time / 60)}m ${time % 60}s</strong></p>
                
                <div class="review-list">
                    ${moduleQuestions.map((q, i) => `
                        <div class="review-item" onclick="toggleRev(${i})">
                            <span style="font-weight:600">Pregunta ${i + 1}</span>
                            <span>${moduleAns[i] === q.c ? '<b style="color:var(--secondary)">Correcta ✅</b>' : '<b style="color:var(--danger)">Incorrecta ❌</b>'} <i data-lucide="chevron-down" size="14"></i></span>
                        </div>
                        <div id="rev-${i}" class="info-box explanation-box" style="display:none; text-align:left; margin:5px 10px 15px 10px;">
                            <strong>Respuesta Correcta:</strong> ${q.o[q.c]}<br>
                            <strong>Análisis Master:</strong> ${q.e}
                        </div>
                    `).join('')}
                </div>

                <div class="info-box" style="text-align:left; border-color:var(--secondary)">
                    <strong>🎯 Siguiente paso:</strong> Continúa al siguiente nivel.
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 2rem;">
                    <button class="btn btn-outline" onclick="resetModule()"><i data-lucide="rotate-ccw"></i> Reintentar</button>
                    ${state.moduloActual < 2 ? 
                        `<button class="btn btn-primary" onclick="changeModule(${state.moduloActual + 1})">Siguiente Nivel <i data-lucide="chevron-right"></i></button>` : 
                        `<button class="btn btn-primary" onclick="renderCurrent()">Ver Reporte Global <i data-lucide="award"></i></button>`
                    }
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    function toggleRev(i) {
        const el = document.getElementById(`rev-${i}`);
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function renderFinalStats(container) {
        const scores = state.respuestas.map((ans, si) => ans.filter((a, qi) => a === modulos[si].preguntas[qi].c).length);
        const totalScore = scores.reduce((a, b) => a + b, 0);
        const totalTime = state.tiempos.reduce((a, b) => a + b, 0);

        if (totalScore >= 27) triggerConfetti();

        container.innerHTML = `
            <div class="stats-panel">
                <h1>🏆 CERTIFICACIÓN MASTER</h1>
                <div class="stat-circle high" style="width:140px; height:140px; font-size:2rem">
                    ${totalScore}/30<small>${Math.round(totalScore * 100 / 30)}%</small>
                </div>
                <p>Tiempo total: <strong>${Math.floor(totalTime / 60)} min ${totalTime % 60} seg</strong></p>
                
                <table>
                    <thead><tr><th style="text-align:left">Módulo</th><th>Aciertos</th><th>Tiempo</th><th>%</th></tr></thead>
                    <tbody>
                        ${SUBINDICES.map((n, i) => `
                            <tr>
                                <td style="text-align:left">${n}</td>
                                <td>${scores[i]}/10</td>
                                <td>${Math.floor(state.tiempos[i] / 60)}:${(state.tiempos[i] % 60).toString().padStart(2, '0')}</td>
                                <td>${scores[i] * 10}%</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>

                <div style="margin-top: 2rem; display: flex; gap: 15px; justify-content: center;">
                    <button class="btn btn-danger-outline" onclick="clearAll()"><i data-lucide="refresh-cw"></i> Reiniciar Curso</button>
                    <button class="btn btn-primary" onclick="window.print()"><i data-lucide="printer"></i> Imprimir Certificado</button>
                </div>

                <div class="info-box" style="margin-top:2rem; border-color:var(--warning); background:rgba(217,119,6,0.05)">
                    <strong>🎓 ¡Felicidades!</strong> Has completado el entrenamiento completo de Habilidad Verbal ECOEMS 2026. 
                    Ahora posees las herramientas para enfrentar cualquier desafío de comprensión lectora y vocabulario.
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    function clearAll() {
        if (confirm("¿Seguro que quieres borrar todo el progreso del curso Master?")) {
            localStorage.removeItem('ecoems_2026_verbal_video5');
            location.reload();
        }
    }

    function triggerConfetti() {
        const canvas = document.getElementById('confetti');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = Array(200).fill().map(() => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            r: Math.random() * 6 + 4,
            c: `hsl(${Math.random() * 360}, 80%, 60%)`,
            v: Math.random() * 4 + 2
        }));
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath(); ctx.fillStyle = p.c; ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
                p.y += p.v; if (p.y > canvas.height) p.y = -20;
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    window.onload = init;
    window.resetModule = resetModule;
    window.togglePause = togglePause;
    window.toggleTheme = toggleTheme;
    window.changeModule = changeModule;
    window.selectOption = selectOption;
    window.nextQ = nextQ;
    window.prevQ = prevQ;
    window.toggleHint = toggleHint;
    window.toggleRev = toggleRev;
    window.clearAll = clearAll;
</script>
</body>
</html>
