<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BioReto Academy - Simulador 20 Niveles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0a0e17; --card: #151a25; --cyan: #00f2ff; --purple: #bd00ff; --text: #e0e6ed; --green: #00ff9d; --red: #ff0055; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; background: linear-gradient(90deg, var(--purple), var(--cyan)); padding: 1rem; text-align: center; box-shadow: 0 0 15px rgba(0,242,255,0.3); }
        h1 { margin: 0; font-size: 1.4rem; color: white; text-transform: uppercase; }
        .container { width: 95%; max-width: 700px; margin: 20px auto; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #2a3140; }
        .stats { display: flex; justify-content: space-between; color: var(--cyan); margin-bottom: 10px; font-weight: bold; }
        .bar-bg { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        .bar-fill { height: 100%; background: var(--cyan); width: 0%; transition: width 0.3s; }
        
        .visual-box { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; min-height: 100px; margin-bottom: 20px; }
        .fig-wrap { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #888; }
        .arrow-sep { font-size: 1.5rem; color: var(--purple); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .btn { background: #232b38; border: 2px solid transparent; padding: 10px; border-radius: 8px; cursor: pointer; min-height: 80px; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .btn:hover { border-color: var(--cyan); transform: translateY(-3px); }
        .btn.correct { background: rgba(0,255,157,0.15); border-color: var(--green); }
        .btn.wrong { background: rgba(255,0,85,0.15); border-color: var(--red); }
        
        .feedback { display: none; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; border-left: 4px solid var(--cyan); }
        .next-btn { background: var(--cyan); border: none; padding: 10px 30px; color: #000; font-weight: bold; border-radius: 20px; cursor: pointer; margin-top: 10px; display: none; }
        svg { overflow: visible; }
    </style>
</head>
<body>

<header>
    <h1>BioReto Academy</h1>
    <small>Entrenamiento Series Espaciales</small>
</header>

<div class="container">
    <div class="stats">
        <span id="level-txt">Nivel 1/20</span>
        <span id="score-txt">Aciertos: 0</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="progress"></div></div>

    <div id="quiz-area">
        <h3 id="q-title" style="color:var(--cyan); margin-top:0;"></h3>
        <p id="q-text" style="font-size: 1.1rem; margin-bottom: 1rem; color: #fff;"></p>
        
        <div class="visual-box" id="visual"></div>
        <div class="grid" id="options"></div>

        <div class="feedback" id="feedback">
            <h4 id="fb-title" style="margin:0 0 5px;"></h4>
            <p id="fb-msg" style="margin:0; font-size:0.9rem;"></p>
            <button class="next-btn" id="next-btn" onclick="nextQ()">Siguiente ➜</button>
        </div>
    </div>

    <div id="final-screen" style="display:none; text-align:center;">
        <h2 style="color:var(--green)">¡Entrenamiento Finalizado!</h2>
        <div style="font-size:3rem; margin:20px;">🚀</div>
        <p style="font-size:1.2rem">Tu resultado: <span id="final-score" style="color:var(--cyan)"></span></p>
        <button class="next-btn" style="display:inline-block" onclick="location.reload()">Reiniciar</button>
    </div>
</div>

<script>
// --- MOTORES GRÁFICOS (DIBUJANTES) ---
const draw = {
    // 1. Cuadrados / Números
    squares: (n) => {
        if(n > 25) return `<svg width="60" height="60"><text x="30" y="40" text-anchor="middle" fill="#00f2ff" font-size="25" font-weight="bold">${n}</text></svg>`;
        let h = ''; let s = 10; let x=0, y=0;
        let cols = Math.ceil(Math.sqrt(n));
        for(let i=0; i<n; i++){
            h += `<rect x="${x*12}" y="${y*12}" width="10" height="10" stroke="#00f2ff" fill="none"/>`;
            x++; if(x>=cols){x=0; y++;}
        }
        return `<svg width="${cols*12}" height="${(y+1)*12}" viewBox="0 0 ${cols*12} ${(y+1)*12}">${h}</svg>`;
    },
    // 2. Flecha Rotatoria
    arrow: (deg) => {
        return `<svg width="60" height="60" viewBox="0 0 100 100" style="transform:rotate(${deg}deg); transition:0.3s">
            <path d="M50 10 L50 90 M50 10 L20 40 M50 10 L80 40" stroke="#00f2ff" stroke-width="8" stroke-linecap="round" fill="none"/>
        </svg>`;
    },
    // 3. Figura L (Compleja)
    lshape: (mode) => {
        let t = "";
        let m = String(mode);
        if(m.includes("r90")) t += "rotate(90,50,50) ";
        if(m.includes("r180")) t += "rotate(180,50,50) ";
        if(m.includes("r270")) t += "rotate(270,50,50) ";
        if(m.includes("refX")) t += "scale(-1,1) translate(-100,0) "; 
        if(m.includes("refY")) t += "scale(1,-1) translate(0,-100) ";
        return `<svg width="60" height="60" viewBox="0 0 100 100"><g transform="${t}">
            <path d="M30 20 L30 80 L80 80 L80 60 L50 60 L50 20 Z" stroke="#bd00ff" stroke-width="4" fill="rgba(189,0,255,0.3)"/></g></svg>`;
    },
    // 4. Polígono Boss
    poly: (p) => {
        let pts = []; let r = 35;
        for(let i=0; i<p.s; i++) {
            let a = (i * 2 * Math.PI / p.s) - Math.PI/2;
            pts.push((50 + r * Math.cos(a)) + "," + (50 + r * Math.sin(a)));
        }
        let f = "none";
        if(p.f === 1) f = "#00f2ff";
        if(p.f === 2) f = "url(#pat)";
        let dotX = 50 + 20 * Math.cos((p.r-90)*Math.PI/180);
        let dotY = 50 + 20 * Math.sin((p.r-90)*Math.PI/180);
        
        return `<svg width="60" height="60" viewBox="0 0 100 100">
            <defs><pattern id="pat" width="4" height="4" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><line x1="0" y="0" x2="0" y2="4" stroke="#00f2ff" stroke-width="1"/></pattern></defs>
            <polygon points="${pts.join(' ')}" stroke="#00f2ff" stroke-width="2" fill="${f}" fill-opacity="0.4"/>
            <circle cx="${dotX}" cy="${dotY}" r="5" fill="white"/>
        </svg>`;
    }
};

// --- BASE DE DATOS ACTUALIZADA ---
// Campo 'txt' agregado para preguntas específicas como la 5
const DB = [
    // --- NIVEL FÁCIL ---
    {t:1, q:"1. Sucesión Aritmética", seq:[2,4,6], ans:8, opts:[7,8,9,10], exp:"Suma 2 en cada paso."},
    {t:2, q:"2. Rotación Horaria", seq:[0,90,180], ans:270, opts:[0,90,180,270], exp:"Gira 90° a la derecha."},
    {t:1, q:"3. Números Triangulares", seq:[1,3,6], ans:10, opts:[8,9,10,12], exp:"Suma +2, +3, +4... (1+2=3, 3+3=6, 6+4=10)."},
    {t:4, q:"4. Lados Crecientes", seq:[{s:3,r:0,f:0},{s:4,r:0,f:0},{s:5,r:0,f:0}], ans:{s:6,r:0,f:0}, opts:[{s:5,r:0,f:0},{s:6,r:0,f:0},{s:7,r:0,f:0},{s:6,r:0,f:1}], exp:"Aumenta un lado: Triángulo -> Cuadrado -> Pentágono -> Hexágono."},
    {t:2, q:"5. Rotación Anti-Horaria", seq:[0,270,180], ans:90, opts:[90,45,0,135], exp:"Resta 90° (gira a la izquierda)."},

    // --- NIVEL MEDIO ---
    {t:3, q:"6. Reflexión Espejo", seq:["norm","refX","norm"], ans:"refX", opts:["norm","refX","refY","r90"], exp:"Se voltea horizontalmente alternadamente."},
    {t:1, q:"7. Potencias", seq:[1,4,9], ans:16, opts:[12,15,16,25], exp:"1², 2², 3²... sigue 4² = 16."},
    {t:4, q:"8. Conteo Inverso", seq:[{s:6,r:0,f:0},{s:5,r:0,f:0},{s:4,r:0,f:0}], ans:{s:3,r:0,f:0}, opts:[{s:3,r:0,f:0},{s:4,r:0,f:0},{s:2,r:0,f:0},{s:5,r:0,f:0}], exp:"Disminuye lados: 6, 5, 4... sigue 3 (Triángulo)."},
    {t:2, q:"9. Giro de 45°", seq:[0,45,90], ans:135, opts:[120,135,150,180], exp:"Suma 45° cada vez."},
    {t:4, q:"10. Relleno Alterno", seq:[{s:4,r:0,f:0},{s:4,r:0,f:1},{s:4,r:0,f:0}], ans:{s:4,r:0,f:1}, opts:[{s:4,r:0,f:0},{s:4,r:0,f:1},{s:4,r:0,f:2},{s:3,r:0,f:1}], exp:"Vacio, Lleno, Vacio... sigue Lleno."},

    // --- NIVEL DIFÍCIL (GUION) ---
    // AQUÍ LA CORRECCIÓN: Agregamos el campo 'txt' explícito
    {t:1, q:"Pregunta 5: Fórmula n(n+1)/2", txt:"¿Cuántos cuadrados formarán la <b>Figura 11</b>?", seq:[1,3,6,10], ans:66, opts:[55,66,45,78], exp:"Usamos la fórmula n(n+1)/2. Para n=11: (11*12)/2 = 66."},
    
    {t:2, q:"Pregunta 6: Flecha", seq:[0,90,180], ans:270, opts:[0,90,180,270], exp:"Gira 90° sentido horario."},
    
    // Si quisieras ser estricto con la Pregunta 7 (Octava figura), podrías agregar txt aquí también, 
    // pero la lógica visual del simulador está simplificada para 'seguir la serie'. 
    {t:3, q:"Pregunta 7: L Combinada", txt:"Continúa la serie (Rotación -> Espejo...)", seq:["norm","r90","refY"], ans:"refY_r90", opts:["refY_r90","norm","r180","refX"], exp:"Patrón: Rota, Espejo, Rota el espejo..."},
    
    {t:4, q:"Sombreado Cíclico", seq:[{s:5,r:0,f:0},{s:5,r:0,f:1},{s:5,r:0,f:2}], ans:{s:5,r:0,f:0}, opts:[{s:5,r:0,f:1},{s:5,r:0,f:2},{s:5,r:0,f:0},{s:6,r:0,f:0}], exp:"Vacío, Lleno, Rayas -> Reinicia a Vacío."},
    {t:2, q:"Oscilación", seq:[0,180,0], ans:180, opts:[0,90,180,270], exp:"Va y viene: 0 -> 180 -> 0 -> 180."},

    // --- NIVEL BOSS ---
    {t:1, q:"Fibonacci", seq:[1,1,2,3,5], ans:8, opts:[7,8,9,10], exp:"Suma de los dos anteriores: 3+5=8."},
    {t:4, q:"Punto Rotatorio", seq:[{s:5,r:0,f:0},{s:5,r:72,f:0},{s:5,r:144,f:0}], ans:{s:5,r:216,f:0}, opts:[{s:5,r:216,f:0},{s:5,r:180,f:0},{s:5,r:0,f:0},{s:6,r:0,f:0}], exp:"El punto gira un vértice (72°) cada vez."},
    {t:3, q:"Rotación Acumulada", seq:["norm","r90","r180"], ans:"r270", opts:["norm","r270","r90","refX"], exp:"Suma 90° progresivamente."},
    {t:4, q:"Pregunta 8: EL GRAN RETO", seq:[{s:3,r:0,f:0},{s:4,r:60,f:1},{s:5,r:120,f:2}], ans:{s:6,r:180,f:0}, opts:[{s:6,r:0,f:1},{s:6,r:180,f:0},{s:5,r:180,f:0},{s:7,r:180,f:0}], exp:"Lados+1, Puntos+60°, Relleno cíclico."},
    {t:4, q:"FINAL BOSS", seq:[{s:8,r:0,f:2},{s:7,r:-45,f:1},{s:6,r:-90,f:0}], ans:{s:5,r:-135,f:2}, opts:[{s:5,r:-135,f:2},{s:5,r:0,f:0},{s:4,r:-135,f:2},{s:5,r:-90,f:1}], exp:"Lados -1, Rotación -45°, Relleno inverso."}
];

let curr = 0;
let score = 0;
let answered = false;

function renderSVG(type, data){
    if(type===1) return draw.squares(data);
    if(type===2) return draw.arrow(data);
    if(type===3) return draw.lshape(data);
    if(type===4) return draw.poly(data);
    return '?';
}

function loadQ(){
    if(curr >= DB.length) { showEnd(); return; }
    
    const d = DB[curr];
    document.getElementById('level-txt').innerText = `Nivel ${curr+1} / ${DB.length}`;
    document.getElementById('q-title').innerText = d.q;
    
    // Lógica corregida: Si existe 'txt' en la BD, úsalo. Si no, usa "Secuencia:"
    document.getElementById('q-text').innerHTML = d.txt ? d.txt : "Secuencia:";
    
    document.getElementById('score-txt').innerText = `Aciertos: ${score}`;
    
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    answered = false;
    document.getElementById('progress').style.width = ((curr)/DB.length*100) + "%";

    const vis = document.getElementById('visual');
    vis.innerHTML = '';
    d.seq.forEach((item, i) => {
        vis.innerHTML += `<div class="fig-wrap">${renderSVG(d.t, item)}<span>Fig ${i+1}</span></div>`;
        if(i < d.seq.length -1) vis.innerHTML += `<div class="arrow-sep">→</div>`;
    });
    // Solo mostrar el "?" si NO es una pregunta de cálculo explícita (como la 5)
    // O simplemente dejarlo como indicador visual de "Incógnita"
    vis.innerHTML += `<div class="arrow-sep">→</div><div class="fig-wrap"><div style="width:50px;height:50px;border:2px dashed #666;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.5rem">?</div></div>`;

    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = '';
    let shuff = [...d.opts].sort(()=> Math.random()-0.5);
    
    shuff.forEach(opt => {
        let btn = document.createElement('div');
        btn.className = 'btn';
        if(d.t === 1 && typeof opt === 'number') btn.innerHTML = `<span style="font-size:1.5rem;font-weight:bold">${opt}</span>`;
        else btn.innerHTML = renderSVG(d.t, opt);
        btn.onclick = () => check(btn, opt, d);
        optsDiv.appendChild(btn);
    });
}

function check(btn, sel, data){
    if(answered) return;
    answered = true;
    
    let correct = false;
    if(typeof data.ans === 'object') correct = JSON.stringify(sel) === JSON.stringify(data.ans);
    else correct = sel === data.ans;
    
    const fb = document.getElementById('feedback');
    fb.style.display = 'block';
    fb.style.borderColor = correct ? 'var(--green)' : 'var(--red)';
    document.getElementById('fb-title').innerText = correct ? "¡EXCELENTE!" : "INCORRECTO";
    document.getElementById('fb-title').style.color = correct ? 'var(--green)' : 'var(--red)';
    document.getElementById('fb-msg').innerText = data.exp;
    
    if(correct) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
    }
    
    document.getElementById('next-btn').style.display = 'inline-block';
    document.getElementById('score-txt').innerText = `Aciertos: ${score}`;
}

function nextQ(){
    curr++;
    loadQ();
}

function showEnd(){
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('final-screen').style.display = 'block';
    document.getElementById('final-score').innerText = `${score} / ${DB.length}`;
    document.getElementById('progress').style.width = "100%";
}

loadQ();
</script>
</body>
</html>
