<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Mando - ECOEMS 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .page-container {
            width: 100%;
            max-width: 215.9mm;
            /* Letter Width */
            height: auto;
            aspect-ratio: 215.9 / 279.4;
            /* Maintain Letter aspect ratio */
            background: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            margin: 0 auto;
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @media print {
            body {
                background: none;
                display: block;
                margin: 0;
            }

            .page-container {
                box-shadow: none;
                width: 100%;
                height: 100%;
                page-break-after: always;
            }
        }
    </style>
</head>

<body>
    <div class="page-container">
        <img src="Gemini_Portada.png" alt="Portada ECOEMS 2026" class="cover-img">
        <a href="dashboard.html" class="start-btn">
            <i class="fas fa-rocket"></i>
            ABRIR MANUAL ESTRATÉGICO
        </a>
    </div>

    <!-- Font Awesome for the icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .start-btn {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #4ECDC4, #2c3e50);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .start-btn:hover {
            transform: translateX(-50%) translateY(-5px);
            box-shadow: 0 15px 35px rgba(78, 205, 196, 0.4);
            background: linear-gradient(135deg, #45b7d1, #1a252f);
        }

        @media print {
            .start-btn {
                display: none;
            }
        }
    </style>
</body>

</html>
